<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>访问记录</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .navbar { display:flex; align-items:center; justify-content:space-between; height:48px; padding:0 20px; border-bottom:1px solid var(--border-l); position:sticky; top:0; background:var(--bg); z-index:10; backdrop-filter:blur(20px); }
    .navbar a { color:var(--accent); text-decoration:none; font-size:14px; }
    .navbar .title { font-size:16px; font-weight:600; }
    .navbar .user { font-size:13px; color:var(--text2); }

    .main { max-width: 900px; margin: 0 auto; padding: 24px; }

    .filters { display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; align-items:center; }
    .filters input, .filters select { padding:8px 12px; border:1px solid var(--border); border-radius:8px; font-size:13px; font-family:inherit; background:var(--bg); color:var(--text); outline:none; }
    .filters input:focus, .filters select:focus { border-color:var(--accent); }

    .card { background:var(--card); border:1px solid var(--border-l); border-radius:var(--r); box-shadow:var(--shadow); overflow:hidden; }
    table { width:100%; border-collapse:collapse; }
    th, td { padding:10px 14px; text-align:left; border-bottom:1px solid var(--border-l); font-size:13px; }
    th { font-size:12px; font-weight:600; color:var(--text2); background:var(--bg2); white-space:nowrap; }
    tr:hover td { background:var(--hover); }
    tr:last-child td { border-bottom:none; }

    .stats { display:flex; gap:14px; margin-bottom:20px; flex-wrap:wrap; }
    .stat { flex:1; min-width:120px; background:var(--bg2); border-radius:var(--r); padding:14px 18px; border:1px solid var(--border-l); text-align:center; }
    .stat .num { font-size:28px; font-weight:700; color:var(--accent); }
    .stat .lbl { font-size:12px; color:var(--text2); margin-top:2px; }

    .btn { display:inline-flex; align-items:center; gap:4px; padding:6px 14px; border-radius:8px; font-size:13px; font-weight:500; font-family:inherit; cursor:pointer; border:none; transition:all 0.2s; }
    .btn-p { background:var(--accent); color:#fff; }
    .btn-p:hover { background:var(--accent-h); }
    .btn-s { background:var(--bg); color:var(--text); border:1px solid var(--border); }
    .btn-s:hover { background:var(--hover); }

    .pagination { display:flex; align-items:center; justify-content:space-between; padding:14px 20px; border-top:1px solid var(--border-l); font-size:13px; color:var(--text2); }
    .pagination .btns { display:flex; gap:6px; }

    .toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); padding:10px 20px; border-radius:8px; font-size:14px; font-weight:500; z-index:200; opacity:0; pointer-events:none; transition:opacity 0.3s; box-shadow:var(--shadow); }
    .toast.show { opacity:1; }
    .toast.ok { background:#30d158; color:#fff; }
    .toast.err { background:var(--danger); color:#fff; }
  </style>
</head>
<body>
<div class="toast" id="toast"></div>

<nav class="navbar">
  <a href="index.html">← 返回主界面</a>
  <span class="title">📊 访问记录</span>
  <span class="user" id="navUser">--</span>
</nav>

<div class="main">
  <div class="stats">
    <div class="stat"><div class="num" id="statToday">0</div><div class="lbl">今日访问</div></div>
    <div class="stat"><div class="num" id="statTotal">0</div><div class="lbl">总访问量</div></div>
    <div class="stat"><div class="num" id="statUsers">0</div><div class="lbl">访问人数</div></div>
  </div>

  <div class="filters">
    <input type="text" id="fMember" placeholder="搜索成员..." />
    <input type="date" id="fDateFrom" />
    <span style="color:var(--text2);">至</span>
    <input type="date" id="fDateTo" />
    <button class="btn btn-p" onclick="doSearch()">🔍 查询</button>
    <button class="btn btn-s" onclick="resetFilters()">重置</button>
  </div>

  <div class="card">
    <div style="overflow-x:auto;">
      <table>
        <thead>
          <tr><th>时间</th><th>成员</th><th>页面</th></tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="pagination">
      <span id="pageInfo">共 0 条</span>
      <div class="btns">
        <button class="btn btn-s" onclick="prevPage()">上一页</button>
        <span id="pageNum" style="padding:0 10px;">1/1</span>
        <button class="btn btn-s" onclick="nextPage()">下一页</button>
      </div>
    </div>
  </div>
</div>

<script>
var SUPABASE_URL='https://nifmryfrgfdjjbrdrgpo.supabase.co';
var SUPABASE_ANON_KEY='sb_publishable_AdLuePdaPCWznuSa6D0ruA_dL9K919U';
var API={
  h:function(){return{apikey:SUPABASE_ANON_KEY,Authorization:'Bearer '+SUPABASE_ANON_KEY};},
  get:async function(p){var r=await fetch(SUPABASE_URL+'/rest/v1/'+p,{headers:this.h()});if(!r.ok)throw Error(await r.text());return r.json();},
};

var curUser=null,logs=[],page=1,pageSize=20,totalCount=0;

function toast(m,t){var e=document.getElementById('toast');e.textContent=m;e.className='toast '+(t||'ok')+' show';clearTimeout(e._t);e._t=setTimeout(function(){e.classList.remove('show');},2500);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function getUser(){
  var s=localStorage.getItem('guild_current_user');
  if(!s){window.location.href='login.html';return null;}
  try{var u=JSON.parse(s);if(!u.id)throw Error();return u;}catch(_){localStorage.removeItem('guild_current_user');window.location.href='login.html';return null;}
}

function fmtTime(d){if(!d)return'-';var dt=new Date(d);return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0')+' '+String(dt.getHours()).padStart(2,'0')+':'+String(dt.getMinutes()).padStart(2,'0');}

function buildQuery(countOnly){
  var base = countOnly ? 'visit_logs?select=count' : 'visit_logs?select=*';
  var filters=[];
  var m=document.getElementById('fMember').value.trim();
  if(m) filters.push('member_name=ilike.%'+encodeURIComponent(m)+'%');
  var from=document.getElementById('fDateFrom').value;
  if(from) filters.push('created_at=gte.'+new Date(from+'T00:00:00').toISOString());
  var to=document.getElementById('fDateTo').value;
  if(to) filters.push('created_at=lt.'+new Date(to+'T23:59:59').toISOString());
  if(filters.length>0) base += '&'+filters.join('&');
  if(!countOnly){
    var start=(page-1)*pageSize;
    base += '&order=created_at.desc&limit='+pageSize+'&offset='+start;
  }
  return base;
}

async function loadLogs(){
  try {
    var countRes = await API.get(buildQuery(true));
    totalCount = (countRes && countRes.length>0) ? (countRes[0].count||0) : 0;
    logs = await API.get(buildQuery(false));
    renderTable();
    // Stats
    var today = new Date().toISOString().split('T')[0];
    var todayCount = await API.get('visit_logs?created_at=gte.'+new Date(today+'T00:00:00').toISOString()+'&select=count');
    var totalAll = await API.get('visit_logs?select=count');
    var usersData = await API.get('visit_logs?select=member_id');
    var uniqueUsers = new Set(); usersData.forEach(function(l){uniqueUsers.add(l.member_id);});
    document.getElementById('statToday').textContent = (todayCount&&todayCount.length)?todayCount[0].count:0;
    document.getElementById('statTotal').textContent = (totalAll&&totalAll.length)?totalAll[0].count:0;
    document.getElementById('statUsers').textContent = uniqueUsers.size;
  } catch(e){ console.error(e); toast('加载失败: '+e.message,'err'); }
}

function renderTable(){
  var html='';
  logs.forEach(function(l){
    html+='<tr><td>'+fmtTime(l.created_at)+'</td><td>'+esc(l.member_name||'')+'</td><td>'+esc(l.page||'')+'</td></tr>';
  });
  document.getElementById('tbody').innerHTML=html||'<tr><td colspan="3" style="text-align:center;color:var(--text3);padding:20px;">暂无记录</td></tr>';
  document.getElementById('pageInfo').textContent='共 '+totalCount+' 条';
  document.getElementById('pageNum').textContent=page+'/'+Math.max(1,Math.ceil(totalCount/pageSize));
}

function doSearch(){ page=1; loadLogs(); }
function prevPage(){ if(page>1){page--;loadLogs();} }
function nextPage(){ if(page<Math.ceil(totalCount/pageSize)){page++;loadLogs();} }
function resetFilters(){
  document.getElementById('fMember').value='';
  document.getElementById('fDateFrom').value='';
  document.getElementById('fDateTo').value='';
  page=1; loadLogs();
}

async function init(){
  curUser=getUser(); if(!curUser) return;
  if(!curUser.is_admin && curUser.position!=='副会长'){ alert('无权限访问'); window.location.href='index.html'; return; }
  document.getElementById('navUser').textContent=curUser.display_name||curUser.uid;
  await loadLogs();
}
init();
</script>
</body>
</html>
