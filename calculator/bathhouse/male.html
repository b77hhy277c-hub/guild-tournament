<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>男澡堂部</title>
<style>
:root{--bg:#fff;--bg2:#f5f5f7;--card:#fff;--hover:rgba(0,0,0,0.04);--text:#1d1d1f;--text2:#6e6e73;--text3:#aeaeb2;--accent:#007AFF;--accent-h:#0062d1;--border:#d2d2d7;--border-l:#e5e5ea;--shadow:0 4px 20px rgba(0,0,0,0.08);--r:12px;}
@media(prefers-color-scheme:dark){:root{--bg:#000;--bg2:#1c1c1e;--card:#1c1c1e;--hover:rgba(255,255,255,0.08);--text:#f5f5f7;--text2:#8e8e93;--text3:#636366;--accent:#0A84FF;--accent-h:#409cff;--border:#38383a;--border-l:#2c2c2e;--shadow:0 1px 3px rgba(255,255,255,0.05);}}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;font-size:14px;color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased;min-height:100vh;}
.navbar{display:flex;align-items:center;justify-content:space-between;height:48px;padding:0 20px;border-bottom:1px solid var(--border-l);position:sticky;top:0;background:var(--bg);z-index:10;backdrop-filter:blur(20px);}
.navbar a{color:var(--accent);text-decoration:none;font-size:14px;}
.navbar .title{font-size:16px;font-weight:600;}
.navbar .user{font-size:13px;color:var(--text2);}
.main{max-width:900px;margin:0 auto;padding:24px;}
.top-bar{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:16px;padding:16px 20px;background:var(--bg2);border-radius:var(--r);border:1px solid var(--border-l);}
.top-bar label{font-weight:500;}
.top-bar input{width:130px;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:15px;font-family:inherit;background:var(--bg);color:var(--text);outline:none;}
.top-bar input:focus{border-color:var(--accent);}
.btn{padding:8px 22px;border-radius:8px;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;border:none;background:var(--accent);color:#fff;transition:background 0.2s;}
.btn:hover{background:var(--accent-h);}
.card{background:var(--card);border:1px solid var(--border-l);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;margin-bottom:20px;}
table{width:100%;border-collapse:collapse;}
th,td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--border-l);font-size:13px;}
th{font-size:11px;font-weight:600;color:var(--text2);background:var(--bg2);white-space:nowrap;}
td{vertical-align:middle;}
tr:hover td{background:var(--hover);}
tr.section-odd td{background:rgba(127,127,127,0.06);}
tr.section-even td{background:transparent;}
tr.section-odd td input.num{background:transparent;}
tr.section-even td input.num{background:transparent;}
input.num{padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;background:var(--bg);color:var(--text);outline:none;text-align:center;width:80px;}
input.num:focus{border-color:var(--accent);}
.result-section{display:none;}
.result-section.show{display:block;}
.result-bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:14px 20px;font-size:14px;font-weight:500;}
.result-bar .hl{color:var(--accent);font-weight:700;}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:8px;font-size:14px;font-weight:500;z-index:200;opacity:0;pointer-events:none;transition:opacity 0.3s;box-shadow:var(--shadow);}
.toast.show{opacity:1;}
.toast.ok{background:#30d158;color:#fff;}
.toast.err{background:#ff3b30;color:#fff;}
@media(max-width:768px){.main{padding:12px 8px;}.top-bar{flex-direction:column;align-items:stretch;gap:8px;}.top-bar input{width:100%;}.top-bar .btn{width:100%;padding:12px;}th,td{padding:6px 4px;font-size:11px;}input.num{font-size:12px;padding:4px;width:60px;}}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal-overlay.show{display:flex;}
.modal{background:var(--card);border-radius:14px;padding:28px;width:420px;max-width:94vw;max-height:70vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.25);border:1px solid var(--border-l);}
.modal h3{font-size:18px;font-weight:600;margin-bottom:8px;}
.modal .talents{font-size:14px;line-height:2;}
.modal .talents .owned{color:#30d158;font-weight:600;}
.modal .talents .unowned{color:var(--text3);}
.talent-count{text-align:center;font-weight:600;color:var(--accent);}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<div class="modal-overlay" id="talentModal"><div class="modal" id="talentModalContent"></div></div>

<nav class="navbar">
<a href="../bathhouse.html">← 返回澡堂</a>
<span class="title">🚹 男澡堂部</span>
<span class="user" id="navUser">--</span>
</nav>

<div class="main">
<div class="top-bar">
<label>可投入票据（万）：</label>
<input type="number" id="budget" value="0" min="0" onchange="saveData()"/>
<button class="btn" onclick="calculate()">📊 计算最优点法</button>
<button class="btn" style="background:var(--bg);color:var(--text);border:1px solid var(--border);" onclick="resetAll()">🔄 一键重填</button>
</div>

<div class="card"><div style="overflow-x:auto;">
<table><thead><tr>
<th style="width:28px;">#</th><th style="width:50px;">编号</th><th style="width:44px;">人才</th><th style="width:60px;">项目</th>
<th style="width:64px;">等级</th><th style="width:84px;">消耗（万）</th><th style="width:84px;">收入提升</th>
</tr></thead><tbody id="inputBody"></tbody></table>
</div></div>

<div class="card result-section" id="resultCard">
<div class="result-bar" id="resultBar"></div>
<div style="overflow-x:auto;">
<table><thead><tr>
<th style="width:28px;">#</th><th>项目</th><th style="width:68px;">性价比</th><th style="width:56px;">升N级</th><th style="width:72px;">消耗</th><th style="width:68px;">新价比</th>
</tr></thead><tbody id="resultBody"></tbody></table>
</div>
<div id="applyBtnWrap" style="padding:14px 20px;border-top:1px solid var(--border-l);display:none;">
<button class="btn" onclick="applyResults()">💾 升级完毕，保存当前等级</button>
</div>
</div>
</div>

<script>
var SUPABASE_URL='https://nifmryfrgfdjjbrdrgpo.supabase.co';
var SUPABASE_ANON_KEY='sb_publishable_AdLuePdaPCWznuSa6D0ruA_dL9K919U';
var API={
h:function(ct){var hd={apikey:SUPABASE_ANON_KEY,Authorization:'Bearer '+SUPABASE_ANON_KEY};if(ct)hd['Content-Type']='application/json';return hd;},
get:function(p){return fetch(SUPABASE_URL+'/rest/v1/'+p,{headers:this.h()}).then(function(r){if(!r.ok)throw Error(r.statusText);return r.json();});},
post:function(p,b){return fetch(SUPABASE_URL+'/rest/v1/'+p,{method:'POST',headers:Object.assign({'Prefer':'return=representation'},this.h(1)),body:JSON.stringify(b)}).then(function(r){if(!r.ok)throw Error(r.statusText);return r.json();});},
patch:function(p,b){return fetch(SUPABASE_URL+'/rest/v1/'+p,{method:'PATCH',headers:this.h(1),body:JSON.stringify(b)}).then(function(r){if(!r.ok)throw Error(r.statusText);return r.text().then(function(t){return t?JSON.parse(t):null;});});},
del:function(p){return fetch(SUPABASE_URL+'/rest/v1/'+p,{method:'DELETE',headers:this.h(1)}).then(function(r){if(!r.ok)throw Error(r.statusText);});}
};

var ABOVE_OFFSET=[0,10,20,20,30];
function aboveCost(n){return 200+40*Math.floor(n/5)+ABOVE_OFFSET[n%5];}
function belowCost(n){return n>=1?1040+40*(n-1):1040;}
function getCost(side,level){return side==='上'?aboveCost(level):belowCost(level);}

var DEPT={
name:'男澡堂部',calcType:'bath_male',
techs:[
{id:'1号',talents:['丽萍','彪子','多情浪子','曾守信','步惊云']},
{id:'2号',talents:['赵阿棉','小陈哥','黄飞鸿','倪冬梅','陈医生','青丘神女']},
{id:'6号',talents:['张大力','迈克周','鲁智深','郑经理','阿星','小燕子']},
{id:'9号',talents:['白铁匠','曾守信','武松','刚毅','孙悟空','福尔康']},
{id:'8号',talents:['刘二狗','倪冬梅','林兽医','摇滚明星','登山员']},
{id:'12号',talents:['周大头','郑经理','聂小倩','赛车手','书文','潘远航']},
{id:'16号',talents:['李双','刚毅','白素贞','林兽医','张良','乾隆']},
{id:'18号',talents:['丽萍','小陈哥','强哥','聂小倩','武则天','聂风']},
{id:'7号',talents:['赛车手','彪子','安塞腰鼓','林冲','牛魔王','福尔康']}
]};
var SUB_ITEMS=['上','下'];

var curUser=null,lastSimResult=null;

var ownedTalents={};
function countOwned(list){var c=0;list.forEach(function(a){if(ownedTalents[a])c++;});return c;}
function showTalentDetail(techId){
var tech=DEPT.techs.find(function(x){return x.id===techId;});if(!tech)return;
var owned=countOwned(tech.talents);
var html='<h3>'+esc(tech.id)+'</h3>';
html+='<p style="font-size:13px;color:var(--text2);margin-bottom:12px;">人才：'+tech.talents.length+' 位 | 已解锁：'+owned+' 位</p>';
html+='<div class="talents">';
tech.talents.forEach(function(a){var cls=ownedTalents[a]?'owned':'unowned';html+='<div class="'+cls+'">'+(ownedTalents[a]?'✅':'⬜')+' '+esc(a)+'</div>';});
html+='</div>';
html+='<div style="margin-top:16px;text-align:right;"><button class="btn" onclick="closeTalentModal()">关闭</button></div>';
document.getElementById('talentModalContent').innerHTML=html;
document.getElementById('talentModal').classList.add('show');
}
function closeTalentModal(){document.getElementById('talentModal').classList.remove('show');}
document.addEventListener('click',function(e){if(e.target===document.getElementById('talentModal'))closeTalentModal();});

async function loadOwnedTalents(){
try{
var cats=await API.get('task_categories?select=id,name,parent_id&order=sort_order.asc');
var talentL1=cats.find(function(c){return!c.parent_id&&c.name==='人才';});
if(!talentL1)return;
var l2s=cats.filter(function(c){return c.parent_id===talentL1.id;});
var l3Names=[];l2s.forEach(function(l2){cats.filter(function(c){return c.parent_id===l2.id;}).forEach(function(l3){l3Names.push(l3.name);});});
var abs=await API.get('member_task_abilities?member_id=eq.'+curUser.id+'&is_able=eq.true&select=task_definition_id');
var checkedDefIds={};abs.forEach(function(a){checkedDefIds[a.task_definition_id]=true;});
var allDefs=await API.get('task_definitions?select=id,category_id&limit=5000');
var catHasTask={};allDefs.forEach(function(d){if(checkedDefIds[d.id])catHasTask[d.category_id]=true;});
ownedTalents={};
l3Names.forEach(function(name){cats.filter(function(c){return c.name===name;}).forEach(function(l3){if(catHasTask[l3.id])ownedTalents[name]=true;});});
}catch(e){console.error(e);}
}

function getUser(){var s=localStorage.getItem('guild_current_user');if(!s){window.location.href='../../login.html';return null;}try{var u=JSON.parse(s);if(!u.id)throw Error();return u;}catch(_){localStorage.removeItem('guild_current_user');window.location.href='../../login.html';return null;}}
function toast(m,t){var e=document.getElementById('toast');e.textContent=m;e.className='toast '+(t||'ok')+' show';clearTimeout(e._t);e._t=setTimeout(function(){e.classList.remove('show');},2500);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function renderInputTable(saved){
saved=saved||{};
var html='';
DEPT.techs.forEach(function(tech,ti){
SUB_ITEMS.forEach(function(side,sbi){
var cls=(ti%2===0)?'section-odd':'section-even';
var key=tech.id+'|'+side;
var d=(saved&&saved[key])||{};
var level=parseInt(d.level)||0;
var cost=(parseInt(d.cost)>0)?parseInt(d.cost):getCost(side,level);
html+='<tr class="'+cls+'">'+
'<td style="text-align:center;">'+(ti+1)+'</td>'+
(sbi===0?'<td style="font-weight:600;vertical-align:top;" rowspan="2">'+esc(tech.id)+' <span style="color:var(--accent);cursor:pointer;font-size:12px;" onclick="showTalentDetail(\''+esc(tech.id)+'\')" title="查看人才">ⓘ</span></td><td class="talent-count" style="vertical-align:top;" rowspan="2">'+countOwned(tech.talents)+'</td>':'')+
'<td style="color:var(--text2);">'+(side==='上'?'上面项目':'下面项目')+'</td>'+
'<td><input type="number" class="num level save-input" data-key="'+esc(key)+'" data-side="'+side+'" value="'+level+'" min="0" onchange="onLevelChange(this)" style="width:58px;"/></td>'+
'<td style="text-align:center;font-weight:500;color:var(--text2);"><span class="cost-display" data-key="'+esc(key)+'">'+cost+'</span></td>'+
'<td><input type="number" class="num income save-input" data-key="'+esc(key)+'" data-field="income" data-side="'+side+'" data-first="'+(ti===0&&side==='上'?'1':'0')+'" value="'+(d.income||0)+'" min="0" '+(ti===0||side==='下'?'':'readonly style="opacity:0.5;cursor:not-allowed;" ')+'onchange="'+(side==='上'?'onIncomeChange(this)':'saveData()')+'" onfocus="'+(side==='上'?'onIncomeChange(this)':'')+'"/></td>'+
'</tr>';
});
});
document.getElementById('inputBody').innerHTML=html;
if(saved&&saved._budget)document.getElementById('budget').value=saved._budget;
try{var simSaved=JSON.parse(localStorage.getItem('calc_'+DEPT.calcType+'_sim')||'null');if(simSaved)lastSimResult=simSaved;}catch(e){}
if(saved&&saved._resultHTML){
document.getElementById('resultBody').innerHTML=saved._resultHTML;
document.getElementById('resultBar').innerHTML=saved._resultBar||'';
document.getElementById('resultCard').classList.add('show');
document.getElementById('applyBtnWrap').style.display='block';
}
}


function onIncomeChange(el){
if(el.dataset.first!=='1')return;
var firstIncome=parseInt(el.value)||0;
var firstCount=countOwned(DEPT.techs[0].talents);
if(firstCount<=0)return;
DEPT.techs.forEach(function(tech,ti){
if(ti===0)return;
var tc=countOwned(tech.talents);
var autoIncome=Math.round(firstIncome*tc/firstCount);
var inp=document.querySelector('.income[data-key="'+esc(tech.id)+'|上"]');
if(inp){inp.value=autoIncome;inp.dispatchEvent(new Event('change'));}
});
saveData();
}
function onLevelChange(el){
var key=el.dataset.key,side=el.dataset.side;
var level=parseInt(el.value)||0;
var costSpan=document.querySelector('.cost-display[data-key="'+esc(key)+'"]');
if(costSpan)costSpan.textContent=getCost(side,level);
saveData();
}

function loadSavedData(){
return API.get('calculator_data?member_id=eq.'+curUser.id+'&calculator_type=eq.'+DEPT.calcType+'&select=data&limit=1')
.then(function(rows){return(rows&&rows.length>0)?rows[0].data:{};}).catch(function(e){return{};});
}

var _saveTimer=null;
function saveData(){
clearTimeout(_saveTimer);
_saveTimer=setTimeout(function(){
var data={};
document.querySelectorAll('.save-input').forEach(function(el){
var key=el.dataset.key,f=el.dataset.field;
if(f){if(!data[key])data[key]={};data[key][f]=parseInt(el.value)||0;}
else {if(!data[key])data[key]={};data[key].level=parseInt(el.value)||0;}
});
data._budget=document.getElementById('budget').value;
var rb=document.getElementById('resultBody'),rr=document.getElementById('resultBar');
if(rb.innerHTML&&document.getElementById('resultCard').classList.contains('show')){data._resultHTML=rb.innerHTML;data._resultBar=rr.innerHTML;}
API.get('calculator_data?member_id=eq.'+curUser.id+'&calculator_type=eq.'+DEPT.calcType+'&select=id&limit=1')
.then(function(ex){if(ex&&ex.length)return API.patch('calculator_data?id=eq.'+ex[0].id,{data:data,updated_at:new Date().toISOString()});else return API.post('calculator_data',{member_id:curUser.id,calculator_type:DEPT.calcType,data:data});})
.catch(function(e){});
},500);
}

function resetAll(){
if(!confirm('确定清空所有数据和结果？'))return;
API.get('calculator_data?member_id=eq.'+curUser.id+'&calculator_type=eq.'+DEPT.calcType+'&select=id&limit=1')
.then(function(ex){if(ex&&ex.length)return API.del('calculator_data?id=eq.'+ex[0].id);}).catch(function(e){});
localStorage.removeItem('calc_'+DEPT.calcType+'_sim');
document.getElementById('budget').value='0';
document.querySelectorAll('.save-input').forEach(function(el){el.value='0';});
document.getElementById('resultCard').classList.remove('show');
document.getElementById('resultBody').innerHTML='';document.getElementById('resultBar').innerHTML='';
document.getElementById('applyBtnWrap').style.display='none';lastSimResult=null;toast('已清空');
}

function gatherItems(){
var items=[];
DEPT.techs.forEach(function(tech){
SUB_ITEMS.forEach(function(side){
var key=tech.id+'|'+side;
var levelEl=document.querySelector('.level[data-key="'+esc(key)+'"]');
var incomeEl=document.querySelector('.income[data-key="'+esc(key)+'"]');
var costSpan=document.querySelector('.cost-display[data-key="'+esc(key)+'"]');
var level=parseInt(levelEl&&levelEl.value)||0;
var cost=parseInt(costSpan.textContent)||getCost(side,level);
var income=parseInt(incomeEl.value)||0;
if(level<=0||cost<=0||income<=0)return;
items.push({label:tech.id+' '+side,side:side,cost:cost,income:income,level:level,ratio:income/cost});
});
});
return items;
}

function levelsToTarget(currentCost,currentLevel,side,income,targetRatio){
var cost=currentCost,lv=currentLevel,n=0,cumCost=0;
while(income/cost>targetRatio){
cumCost+=cost;cost=getCost(side,lv+1);lv++;n++;
if(n>10000)break;
}
return{levels:n,cost:cumCost,newCost:cost,newLevel:lv};
}

function calculate(){
var budget=parseInt(document.getElementById('budget').value)||0;
if(budget<=0){toast('请输入可投入票据','err');return;}
var items=gatherItems();
if(items.length===0){toast('请至少填写一项数据','err');return;}

var sim=items.map(function(it){return{label:it.label,side:it.side,cost:it.cost,income:it.income,level:it.level,ratio:it.ratio,origRatio:it.ratio,upgraded:0,spent:0};});
sim.sort(function(a,b){return b.ratio-a.ratio;});
var remaining=budget,totalSpent=0;

for(var iter=0;iter<500&&remaining>0;iter++){
sim.sort(function(a,b){return b.ratio-a.ratio;});
var bestR=sim[0].ratio,worstR=sim[sim.length-1].ratio;
if(bestR-worstR<0.000001)break;
var target=null;
for(var i=1;i<sim.length;i++){if(sim[i].ratio<bestR-0.000001){target=sim[i].ratio;break;}}
if(target===null)break;

var needBudget=0,batch=[];
for(var i=0;i<sim.length;i++){
if(sim[i].ratio<bestR-0.0001)break;
var it=sim[i];if(it.income/it.cost<=target)continue;
var result=levelsToTarget(it.cost,it.level,it.side,it.income,target);
if(result.levels>0){needBudget+=result.cost;batch.push({item:it,levels:result.levels,cost:result.cost,newCost:result.newCost,newLevel:result.newLevel});}
}
if(needBudget<=0)break;
if(remaining>=needBudget){
batch.forEach(function(b){b.item.cost=b.newCost;b.item.level=b.newLevel;b.item.ratio=b.item.income/b.item.cost;b.item.spent+=b.cost;b.item.upgraded+=b.levels;remaining-=b.cost;totalSpent+=b.cost;});
}else{
while(remaining>0){sim.sort(function(a,b){return b.ratio-a.ratio;});var best=sim[0];if(best.cost>remaining)break;remaining-=best.cost;totalSpent+=best.cost;best.spent+=best.cost;best.upgraded+=1;
best.cost=getCost(best.side,best.level+1);best.level++;best.ratio=best.income/best.cost;}break;
}
}
while(remaining>0){sim.sort(function(a,b){return b.ratio-a.ratio;});var best=sim[0];if(best.cost>remaining)break;remaining-=best.cost;totalSpent+=best.cost;best.spent+=best.cost;best.upgraded+=1;
best.cost=getCost(best.side,best.level+1);best.level++;best.ratio=best.income/best.cost;}

lastSimResult=sim;
try{var simSave=sim.map(function(s){return{label:s.label,cost:s.cost,level:s.level,upgraded:s.upgraded,spent:Math.round(s.spent)};});localStorage.setItem('calc_'+DEPT.calcType+'_sim',JSON.stringify(simSave));}catch(e){}
renderResults(sim,budget,totalSpent,remaining);
document.getElementById('applyBtnWrap').style.display='block';saveData();
}

function renderResults(sim,budget,spent,remaining){
var html='';
sim.forEach(function(s,si){
var cls=(si%2===0)?'section-odd':'section-even';
html+='<tr class="'+cls+'">'+
'<td style="text-align:center;">'+(si+1)+'</td>'+
'<td>'+esc(s.label)+'</td>'+
'<td style="text-align:right;">'+s.origRatio.toFixed(6)+'</td>'+
'<td style="text-align:center;font-weight:600;color:var(--accent);">'+(s.upgraded>0?'+'+s.upgraded:'-')+'</td>'+
'<td style="text-align:right;font-weight:600;">'+Math.round(s.spent).toLocaleString()+'</td>'+
'<td style="text-align:right;">'+s.ratio.toFixed(6)+'</td></tr>';
});
document.getElementById('resultBody').innerHTML=html;
document.getElementById('resultBar').innerHTML='<span>💰 预算 <span class="hl">'+budget.toLocaleString()+'</span></span><span>|</span><span>📊 分配 <span class="hl">'+Math.round(spent).toLocaleString()+'</span></span><span>|</span><span>📦 剩余 <span class="hl">'+Math.round(remaining).toLocaleString()+'</span></span>';
document.getElementById('resultCard').classList.add('show');
}

function applyResults(){
if(!lastSimResult||lastSimResult.length===0){toast('无方案可保存','err');return;}
if(!confirm('请确认已按当前方案升级，保存后将自动更新表格中的等级。'))return;
lastSimResult.forEach(function(s){
var key=s.label.replace(' ','|');
var levelEl=document.querySelector('.level[data-key="'+esc(key)+'"]');
var costEl=document.querySelector('.cost[data-key="'+esc(key)+'"]');
if(levelEl)levelEl.value=s.level;
if(costEl)costEl.value=s.cost;
});
document.getElementById('budget').value='0';lastSimResult=null;
document.getElementById('resultCard').classList.remove('show');
document.getElementById('resultBody').innerHTML='';document.getElementById('resultBar').innerHTML='';
document.getElementById('applyBtnWrap').style.display='none';
localStorage.removeItem('calc_'+DEPT.calcType+'_sim');saveData();
toast('✅ 已保存，票据已清零');
}

async function init(){
curUser=getUser();if(!curUser)return;
if(!curUser.is_admin){alert('无权限访问');window.location.href='../../index.html';return;}
document.getElementById('navUser').textContent=curUser.display_name||curUser.uid;
loadOwnedTalents().then(function(){loadSavedData().then(function(saved){renderInputTable(saved);});});
}
init();
</script>
