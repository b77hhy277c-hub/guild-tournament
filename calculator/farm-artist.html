<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>农田-艺人锻炼</title>
  <style>
    :root {
      --bg:#fff;--bg2:#f5f5f7;--card:#fff;--hover:rgba(0,0,0,0.04);
      --text:#1d1d1f;--text2:#6e6e73;--text3:#aeaeb2;
      --accent:#007AFF;--accent-h:#0062d1;
      --border:#d2d2d7;--border-l:#e5e5ea;
      --shadow:0 4px 20px rgba(0,0,0,0.08);--r:12px;
    }
    @media (prefers-color-scheme:dark){
      :root {
        --bg:#000;--bg2:#1c1c1e;--card:#1c1c1e;
        --hover:rgba(255,255,255,0.08);
        --text:#f5f5f7;--text2:#8e8e93;--text3:#636366;
        --accent:#0A84FF;--accent-h:#409cff;
        --border:#38383a;--border-l:#2c2c2e;
        --shadow:0 1px 3px rgba(255,255,255,0.05);
      }
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;font-size:14px;color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased;min-height:100vh;}

    .navbar{display:flex;align-items:center;justify-content:space-between;height:48px;padding:0 20px;border-bottom:1px solid var(--border-l);position:sticky;top:0;background:var(--bg);z-index:10;backdrop-filter:blur(20px);}
    .navbar a{color:var(--accent);text-decoration:none;font-size:14px;}
    .navbar .title{font-size:16px;font-weight:600;}
    .navbar .user{font-size:13px;color:var(--text2);}

    .main{max-width:1000px;margin:0 auto;padding:24px;}

    .top-bar{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:16px;padding:16px 20px;background:var(--bg2);border-radius:var(--r);border:1px solid var(--border-l);}
    .top-bar label{font-weight:500;}
    .top-bar input{width:130px;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:15px;font-family:inherit;background:var(--bg);color:var(--text);outline:none;}
    .top-bar input:focus{border-color:var(--accent);}
    .btn{padding:8px 22px;border-radius:8px;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;border:none;background:var(--accent);color:#fff;transition:background 0.2s;}
    .btn:hover{background:var(--accent-h);}

    .card{background:var(--card);border:1px solid var(--border-l);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;margin-bottom:20px;}
    table{width:100%;border-collapse:collapse;}
    th,td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--border-l);font-size:13px;}
    th{font-size:11px;font-weight:600;color:var(--text2);background:var(--bg2);white-space:nowrap;}
    td{vertical-align:middle;}
    tr:hover td{background:var(--hover);}
    tr.section-odd td{background:rgba(127,127,127,0.06);}
    tr.section-even td{background:transparent;}
    tr.section-odd td input.num{background:transparent;}
    tr.section-even td input.num{background:transparent;}

    input.num{padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;background:var(--bg);color:var(--text);outline:none;}
    input.num:focus{border-color:var(--accent);}
    .artist-count{text-align:center;font-weight:600;color:var(--accent);}

    .result-section{display:none;}
    .result-section.show{display:block;}
    .result-bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:14px 20px;font-size:14px;font-weight:500;}
    .result-bar .hl{color:var(--accent);font-weight:700;}

    .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:8px;font-size:14px;font-weight:500;z-index:200;opacity:0;pointer-events:none;transition:opacity 0.3s;box-shadow:var(--shadow);}
    .toast.show{opacity:1;}
    .toast.ok{background:#30d158;color:#fff;}
    .toast.err{background:#ff3b30;color:#fff;}
    .toast.info{background:var(--accent);color:#fff;}

    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
    .modal-overlay.show{display:flex;}
    .modal{background:var(--card);border-radius:14px;padding:28px;width:420px;max-width:94vw;max-height:70vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.25);border:1px solid var(--border-l);}
    .modal h3{font-size:18px;font-weight:600;margin-bottom:8px;}
    .modal .artists{font-size:14px;line-height:2;}
    .modal .artists .owned{color:#30d158;font-weight:600;}
    .modal .artists .unowned{color:var(--text3);}
    @media(max-width:768px){.main{padding:12px 8px;}.top-bar{flex-direction:column;align-items:stretch;gap:8px;}.top-bar input{width:100%;}.top-bar .btn{width:100%;padding:12px;}th,td{padding:6px 4px;font-size:11px;}input.num{font-size:12px;padding:4px;}.card .usage-note{padding:12px 14px;font-size:12px;}.result-bar{flex-direction:column;align-items:flex-start;gap:4px;font-size:13px;}}
  </style>
</head>

</div>

<script>

function toast(m,t){var e=document.getElementById('toast');e.textContent=m;e.className='toast '+(t||'ok')+' show';clearTimeout(e._t);e._t=setTimeout(function(){e.classList.remove('show');},2500);}

// Growth helpers
function getGrowth(level){
  if(level>=200)return 1.009;
  if(level>=100)return 1.01;
  return 1.012;
}

// 18 projects with assigned artists

var lastSimResult=null;

function showArtistDetail(projectName){
  var p=PROJECTS.find(function(x){return x.name===projectName;});

  var html='<h3>'+esc(p.name)+'</h3>';
  html+='<p style="font-size:13px;color:var(--text2);margin-bottom:12px;">涉及艺人：'+p.artists.length+' 位 | 已解锁：'+countOwned(p.artists)+' 位</p>';

    var cls=ownedArtists[a]?'owned':'unowned';
    var icon=ownedArtists[a]?'✅':'⬜';

  });

function closeArtistModal(){document.getElementById('artistModal').classList.remove('show');}
document.addEventListener('click',function(e){if(e.target===document.getElementById('artistModal'))closeArtistModal();});

// Load user's owned artists
async function loadOwnedArtists(){
  try {
    document.getElementById('loadStatus').textContent='加载中...';
    // Find 艺人 L3 categories
    var cats=await API.get('task_categories?select=id,name,parent_id&order=sort_order.asc');
    var talentL1=cats.find(function(c){return !c.parent_id && c.name==='艺人';});
    if(!talentL1){console.warn('艺人 L1 not found');return;}
    // Find L2s under 艺人 (属性)
    var l2s=cats.filter(function(c){return c.parent_id===talentL1.id;});
    var l3Names=[];
    l2s.forEach(function(l2){
      cats.filter(function(c){return c.parent_id===l2.id;}).forEach(function(l3){
        l3Names.push(l3.name);
      });
    });
    // Get user's checked abilities
    var abs=await API.get('member_task_abilities?member_id=eq.'+curUser.id+'&is_able=eq.true&select=task_definition_id');
    var checkedDefIds={};
    abs.forEach(function(a){checkedDefIds[a.task_definition_id]=true;});
    // Get task defs for these abilities
    var allDefs=await API.get('task_definitions?select=id,category_id&limit=5000');
    var catHasTask={};
    allDefs.forEach(function(d){
      if(checkedDefIds[d.id]) catHasTask[d.category_id]=true;
    });
    // Which L3 categories have at least one checked task?
    ownedArtists={};
    l3Names.forEach(function(name){
      // Find all L3s with this name and check if any has a checked task
      cats.filter(function(c){return c.name===name;}).forEach(function(l3){
        if(catHasTask[l3.id]) ownedArtists[name]=true;
      });
    });
    // Also check if the name was already matched via any L3
    document.getElementById('loadStatus').textContent='已加载 '+Object.keys(ownedArtists).length+' 位艺人';
  }catch(e){console.error(e);document.getElementById('loadStatus').textContent='加载失败: '+e.message;}
}

// Count owned artists for a project
function countOwned(artistList){
  var c=0;
  artistList.forEach(function(a){if(ownedArtists[a])c++;});
  return c;
}

function buildInputTable(){
  loadSavedData().then(function(saved){ renderInputTable(saved); });
}
function renderInputTable(saved){
  var html='';
  PROJECTS.forEach(function(p,si){
    var cls=(si%2===0)?'section-odd':'section-even';
    var d=(saved&&saved[p.name])||{};
    var ac=countOwned(p.artists);
    html+='<tr class="'+cls+'">'+
      '<td style="text-align:center;">'+(si+1)+'</td>'+
      '<td style="font-weight:600;">'+esc(p.name)+' <span style="color:var(--accent);cursor:pointer;font-size:12px;" onclick="showArtistDetail(\''+esc(p.name)+'\')" title="查看涉及艺人">ⓘ</span></td>'+
      '<td class="artist-count">'+ac+'</td>'+
      '<td style="text-align:center;"><input type="number" class="num level save-input" data-name="'+esc(p.name)+'" data-field="level" value="'+(d.level||0)+'" min="0" style="width:72px;text-align:center;" onchange="saveData()" /></td>'+
      '<td style="text-align:center;"><input type="number" class="num cost save-input" style="width:88px;text-align:center;" data-name="'+esc(p.name)+'" data-field="cost" value="'+(d.cost||0)+'" min="0" onchange="saveData()" /></td>'+
    '</tr>';
  });
  document.getElementById('inputBody').innerHTML=html;
  if(saved&&saved._budget)document.getElementById('budget').value=saved._budget;
  // Restore sim + results
  try{var simSaved=JSON.parse(localStorage.getItem('calc_artist_sim')||'null');if(simSaved)lastSimResult=simSaved;}catch(e){}
  if(saved&&saved._resultHTML){
    document.getElementById('resultBody').innerHTML=saved._resultHTML;
    document.getElementById('resultBar').innerHTML=saved._resultBar||'';
    document.getElementById('resultCard').classList.add('show');
    document.getElementById('applyBtnWrap').style.display='block';
  }
}

function loadSavedData(){
  return API.get('calculator_data?member_id=eq.'+curUser.id+'&calculator_type=eq.farm_artist&select=data&limit=1')
    .then(function(rows){ return (rows&&rows.length>0)?rows[0].data:{}; })
    .catch(function(e){console.warn('loadSavedData error:',e);return{};});

var _saveTimer=null;
function saveData(){
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(function(){
    var data={};
    document.querySelectorAll('.save-input').forEach(function(el){
      var name=el.dataset.name;
      var field=el.dataset.field;
      if(!data[name])data[name]={};
      data[name][field]=parseInt(el.value)||0;
    });
    data._budget=document.getElementById('budget').value;
    var rb=document.getElementById('resultBody'),rr=document.getElementById('resultBar');
    if(rb.innerHTML&&document.getElementById('resultCard').classList.contains('show')){
      data._resultHTML=rb.innerHTML;data._resultBar=rr.innerHTML;
    }
    API.get('calculator_data?member_id=eq.'+curUser.id+'&calculator_type=eq.farm_artist&select=id&limit=1')
      .then(function(ex){
        if(ex&&ex.length){
          return API.patch('calculator_data?id=eq.'+ex[0].id,{data:data,updated_at:new Date().toISOString()});
        } else {
          return API.post('calculator_data',{member_id:curUser.id,calculator_type:'farm_artist',data:data});
        }
      }).catch(function(e){console.warn('saveData error:',e);});
  },500);
}

function resetAll(){
  if(!confirm('确定清空所有数据和结果？'))return;
  API.get('calculator_data?member_id=eq.'+curUser.id+'&calculator_type=eq.farm_artist&select=id&limit=1')
    .then(function(ex){if(ex&&ex.length)return API.del('calculator_data?id=eq.'+ex[0].id);})
    .catch(function(e){console.warn('reset error:',e);});
  localStorage.removeItem('calc_artist_sim');
  document.getElementById('budget').value='0';
  document.querySelectorAll('.save-input').forEach(function(el){el.value='0';});
  document.getElementById('resultCard').classList.remove('show');
  document.getElementById('resultBody').innerHTML='';
  document.getElementById('resultBar').innerHTML='';
  document.getElementById('applyBtnWrap').style.display='none';
  lastSimResult=null;
  toast('已清空');
}

function gatherItems(){
  var items=[];
  PROJECTS.forEach(function(p){
    var costEl=document.querySelector('.cost[data-name="'+esc(p.name)+'"]');
    var levelEl=document.querySelector('.level[data-name="'+esc(p.name)+'"]');
    var cost=parseInt(costEl.value)||0;
    var level=parseInt(levelEl.value)||0;
    var count=countOwned(p.artists);
    if(cost<=0||count<=0)return;
    items.push({name:p.name,level:level,cost:cost,artists:count,ratio:cost/count});
  });
  return items;
}

function calculate(){
  var budget=parseInt(document.getElementById('budget').value)||0;
  if(budget<=0){toast('请输入可投入果票','err');return;}
  var items=gatherItems();
  if(items.length===0){toast('请至少填写一项数据（需同时有升级消耗和艺人数量>0）','err');return;}

  var sim=items.map(function(it){return{name:it.name,level:it.level,cost:it.cost,artists:it.artists,ratio:it.ratio,origRatio:it.ratio,upgraded:0,spent:0};});
  // Sort by ratio ASC (best = lowest cost per artist)
  sim.sort(function(a,b){return a.ratio-b.ratio;});
  var remaining=budget,totalSpent=0;

  // One level at a time: upgrade the best ratio project
  while(remaining>0){
    sim.sort(function(a,b){return a.ratio-b.ratio;});
    var best=sim[0];
    if(best.cost>remaining)break;
    remaining-=best.cost;
    totalSpent+=best.cost;
    best.spent+=best.cost;
    best.upgraded+=1;
    best.cost=Math.round(best.cost*getGrowth(best.level));
    best.level++;
    best.ratio=best.cost/best.artists;
  }

  lastSimResult=sim;
  try{
    var simSave=sim.map(function(s){return{name:s.name,cost:Math.round(s.cost),level:s.level,artists:s.artists,upgraded:s.upgraded,spent:Math.round(s.spent)};});
    localStorage.setItem('calc_artist_sim',JSON.stringify(simSave));
  }catch(e){}
  var totalCharm=0;sim.forEach(function(s){totalCharm+=s.upgraded*s.artists*2;});
  renderResults(sim,budget,totalSpent,remaining,totalCharm);
  document.getElementById('applyBtnWrap').style.display='block';
  saveData();
}

function renderResults(sim,budget,spent,remaining,totalCharm){
  sim.sort(function(a,b){return PROJECTS.findIndex(function(p){return p.name===a.name;})-PROJECTS.findIndex(function(p){return p.name===b.name;});});
  var html='';
  sim.forEach(function(s,si){
    var cls=(si%2===0)?'section-odd':'section-even';
    var charmInc=s.upgraded*s.artists*2;
    html+='<tr class="'+cls+'">'+
      '<td style="text-align:center;">'+(si+1)+'</td>'+
      '<td style="font-weight:600;">'+esc(s.name)+'</td>'+
      '<td class="artist-count">'+s.artists+'</td>'+
      '<td style="text-align:right;">'+s.origRatio.toFixed(2)+'</td>'+
      '<td style="text-align:center;font-weight:600;color:var(--accent);">'+(s.upgraded>0?'+'+s.upgraded:'-')+'</td>'+
      '<td style="text-align:right;font-weight:600;">'+Math.round(s.spent).toLocaleString()+'</td>'+
      '<td style="text-align:right;">'+s.ratio.toFixed(2)+'</td>'+
      '<td style="text-align:center;color:#30d158;font-weight:600;">'+(charmInc>0?'+'+charmInc:'-')+'</td>'+
    '</tr>';
  });
  document.getElementById('resultBody').innerHTML=html;
  document.getElementById('resultBar').innerHTML=
    '<span>💰 预算 <span class="hl">'+budget.toLocaleString()+'</span> 万</span>'+
    '<span>|</span><span>📊 分配 <span class="hl">'+Math.round(spent).toLocaleString()+'</span></span>'+
    '<span>|</span><span>📦 剩余 <span class="hl">'+Math.round(remaining).toLocaleString()+'</span></span>'+
    '<span>|</span><span>✨ 魅力+<span class="hl">'+totalCharm.toLocaleString()+'</span></span>';
  document.getElementById('resultCard').classList.add('show');
}

function applyResults(){
  if(!lastSimResult||lastSimResult.length===0){toast('无方案可保存，请先点击计算','err');return;}
  if(!confirm('请确认已按当前方案升级，保存后将自动更新表格中的等级和升级消耗。'))return;
  lastSimResult.forEach(function(s){
    var levelEl=document.querySelector('.level[data-name="'+esc(s.name)+'"]');
    var costEl=document.querySelector('.cost[data-name="'+esc(s.name)+'"]');
    if(levelEl)levelEl.value=(parseInt(levelEl.value)||0)+s.upgraded;
    if(costEl)costEl.value=Math.round(s.cost);
  });
  document.getElementById('budget').value='0';
  lastSimResult=null;
  document.getElementById('resultCard').classList.remove('show');
  document.getElementById('resultBody').innerHTML='';
  document.getElementById('resultBar').innerHTML='';
  document.getElementById('applyBtnWrap').style.display='none';
  localStorage.removeItem('calc_artist_sim');
  saveData();
  toast('✅ 已保存，果票已清零');
}

async function init(){
  curUser=getUser();if(!curUser)return;
  if(!curUser.is_admin){alert('无权限访问');window.location.href='../index.html';return;}
  document.getElementById('navUser').textContent=curUser.display_name||curUser.uid;
  loadOwnedArtists().then(function(){ buildInputTable(); });
}
init();
</script>
