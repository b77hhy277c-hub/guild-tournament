<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>计算器使用记录</title>
  <style>
    :root {
      --bg:#fff;--bg2:#f5f5f7;--card:#fff;--hover:rgba(0,0,0,0.04);
      --text:#1d1d1f;--text2:#6e6e73;--text3:#aeaeb2;
      --accent:#007AFF;--accent-h:#0062d1;
      --border:#d2d2d7;--border-l:#e5e5ea;
      --shadow:0 4px 20px rgba(0,0,0,0.08);--r:12px;
    }
    @media (prefers-color-scheme:dark){
      :root{--bg:#000;--bg2:#1c1c1e;--card:#1c1c1e;--hover:rgba(255,255,255,0.08);--text:#f5f5f7;--text2:#8e8e93;--text3:#636366;--accent:#0A84FF;--accent-h:#409cff;--border:#38383a;--border-l:#2c2c2e;--shadow:0 1px 3px rgba(255,255,255,0.05);}
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;font-size:14px;color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased;min-height:100vh;}

    .navbar{display:flex;align-items:center;justify-content:space-between;height:48px;padding:0 20px;border-bottom:1px solid var(--border-l);position:sticky;top:0;background:var(--bg);z-index:10;backdrop-filter:blur(20px);}
    .navbar a{color:var(--accent);text-decoration:none;font-size:14px;}
    .navbar .title{font-size:16px;font-weight:600;}
    .navbar .user{font-size:13px;color:var(--text2);}

    .main{max-width:960px;margin:0 auto;padding:24px;}
    .card{background:var(--card);border:1px solid var(--border-l);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;}
    h2{font-size:20px;font-weight:600;padding:20px 20px 0;}
    .sub{font-size:13px;color:var(--text2);padding:4px 20px 16px;}

    table{width:100%;border-collapse:collapse;}
    th,td{padding:10px 14px;text-align:left;border-bottom:1px solid var(--border-l);font-size:13px;}
    th{font-size:12px;font-weight:600;color:var(--text2);background:var(--bg2);}
    tr:hover td{background:var(--hover);}
    .time{white-space:nowrap;color:var(--text2);}
    .never{color:var(--text3);text-align:center;}
  </style>
</head>
<body>

<nav class="navbar">
  <a href="../calculator.html">← 返回蘑菇的计算器</a>
  <span class="title">📊 计算器使用记录</span>
  <span class="user" id="navUser">--</span>
</nav>

<div class="main">
  <div class="card">
    <h2>成员使用记录</h2>
    <p class="sub">每位成员最后一次使用各计算器的时间</p>
    <div style="overflow-x:auto;">
      <table>
        <thead>
          <tr>
            <th>成员</th>
            <th>店铺研究</th>
            <th>艺人锻炼</th>
            <th>人才(肉票)</th>
            <th>人才(粮票)</th>
          </tr>
        </thead>
        <tbody id="tbody"><tr><td colspan="5" style="text-align:center;color:var(--text3);padding:20px;">加载中...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<script>
var SUPABASE_URL='https://nifmryfrgfdjjbrdrgpo.supabase.co';
var SUPABASE_ANON_KEY='sb_publishable_AdLuePdaPCWznuSa6D0ruA_dL9K919U';
var API={
  h:function(){return{apikey:SUPABASE_ANON_KEY,Authorization:'Bearer '+SUPABASE_ANON_KEY};},
  get:async function(p){var r=await fetch(SUPABASE_URL+'/rest/v1/'+p,{headers:this.h()});if(!r.ok)throw Error(await r.text());return r.json();}
};

var curUser=null;
function getUser(){
  var s=localStorage.getItem('guild_current_user');
  if(!s){window.location.href='../login.html';return null;}
  try{var u=JSON.parse(s);if(!u.id)throw Error();return u;}catch(_){localStorage.removeItem('guild_current_user');window.location.href='../login.html';return null;}
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function fmtTime(d){
  if(!d)return '';
  var dt=new Date(d);
  return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0')+' '+String(dt.getHours()).padStart(2,'0')+':'+String(dt.getMinutes()).padStart(2,'0');
}

async function loadData(){
  try {
    var members=await API.get('members?select=id,display_name&order=display_name.asc');
    var records=await API.get('calculator_data?select=member_id,calculator_type,updated_at&order=updated_at.desc');
    // Build map: member_id → { farm_shop: time, farm_artist: time }
    var map={};
    records.forEach(function(r){
      if(!map[r.member_id])map[r.member_id]={};
      if(!map[r.member_id][r.calculator_type])map[r.member_id][r.calculator_type]=r.updated_at;
    });

    var types=['farm_shop','farm_artist','farm_talent_meat','farm_talent_food'];
    var html='';
    members.forEach(function(m){
      var d=map[m.id]||{};
      html+='<tr><td><strong>'+esc(m.display_name)+'</strong></td>';
      types.forEach(function(t){
        html+='<td class="time">'+(d[t]?fmtTime(d[t]):'<span class="never">从未使用</span>')+'</td>';
      });
      html+='</tr>';
    });
    document.getElementById('tbody').innerHTML=html;
  }catch(e){console.error(e);document.getElementById('tbody').innerHTML='<tr><td colspan="5" style="text-align:center;color:red;padding:20px;">加载失败: '+esc(e.message)+'</td></tr>';}
}

async function init(){
  curUser=getUser();if(!curUser)return;
  if(!curUser.is_admin){alert('无权限访问');window.location.href='../calculator.html';return;}
  document.getElementById('navUser').textContent=curUser.display_name||curUser.uid;
  await loadData();
}
init();
</script>
</body>
</html>
