<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>蘑菇的计算器</title>
  <style>
    :root {
      --bg: #ffffff; --bg2: #f5f5f7; --card: #ffffff; --hover: rgba(0,0,0,0.04);
      --text: #1d1d1f; --text2: #6e6e73; --text3: #aeaeb2;
      --accent: #007AFF; --accent-h: #0062d1;
      --border: #d2d2d7; --border-l: #e5e5ea;
      --shadow: 0 4px 20px rgba(0,0,0,0.08); --r: 14px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000000; --bg2: #1c1c1e; --card: #1c1c1e;
        --hover: rgba(255,255,255,0.08);
        --text: #f5f5f7; --text2: #8e8e93; --text3: #636366;
        --accent: #0A84FF; --accent-h: #409cff;
        --border: #38383a; --border-l: #2c2c2e;
        --shadow: 0 1px 3px rgba(255,255,255,0.05);
      }
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif; font-size: 15px; color: var(--text); background: var(--bg); -webkit-font-smoothing: antialiased; min-height: 100vh; }

    .navbar { display:flex; align-items:center; justify-content:space-between; height:48px; padding:0 20px; border-bottom:1px solid var(--border-l); position:sticky; top:0; background:var(--bg); z-index:10; backdrop-filter:blur(20px); }
    .navbar a { color:var(--accent); text-decoration:none; font-size:14px; }
    .navbar .title { font-size:16px; font-weight:600; }
    .navbar .user { font-size:13px; color:var(--text2); }

    .main { max-width: 720px; margin: 0 auto; padding: 32px 24px 48px; }

    h1 { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
    .sub { font-size: 15px; color: var(--text2); margin-bottom: 32px; }

    .card-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
    @media (max-width: 560px) { .card-grid { grid-template-columns:1fr; } }

    .calc-card {
      display:flex; flex-direction:column; align-items:center; text-align:center;
      background:var(--card); border:1px solid var(--border-l);
      border-radius:var(--r); padding:36px 24px 28px;
      box-shadow:var(--shadow); cursor:pointer;
      text-decoration:none; color:inherit;
      transition:transform 0.25s, box-shadow 0.25s;
    }
    .calc-card:hover { transform:translateY(-3px); box-shadow:0 12px 40px rgba(0,0,0,0.12); }
    .calc-card .icon { font-size:48px; margin-bottom:16px; }
    .calc-card .name { font-size:20px; font-weight:600; margin-bottom:6px; }
    .calc-card .desc { font-size:14px; color:var(--text2); }

    .badge { display:inline-block; padding:4px 12px; border-radius:6px; font-size:12px; font-weight:500; background:var(--accent); color:#fff; margin-left:8px; vertical-align:middle; }
    .hint { font-size:13px; color:var(--text3); margin-top:32px; text-align:center; }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="index.html">← 返回主界面</a>
  <span class="title">🍄 蘑菇的计算器</span>
  <span class="user" id="navUser">--</span>
</nav>

<div class="main">
  <h1>蘑菇的计算器<span class="badge">仅超管</span></h1>
  <p class="sub">选择你要计算的项目</p>

  <div class="card-grid">
    <a href="calculator/farm-shop.html" class="calc-card">
      <div class="icon">🏪</div>
      <div class="name">农田-店铺研究</div>
      <div class="desc">计算店铺研究最优点法</div>
    </a>

    <a href="calculator/farm-talent-food.html" class="calc-card">
      <div class="icon">🌾</div>
      <div class="name">农田-人才锻炼（粮票）</div>
      <div class="desc">计算粮票型人才锻炼最优点法</div>
    </a>

    <a href="calculator/farm-talent-meat.html" class="calc-card">
      <div class="icon">🥩</div>
      <div class="name">农田-人才锻炼（肉票）</div>
      <div class="desc">计算肉票型人才锻炼最优点法</div>
    </a>

    <a href="calculator/farm-artist.html" class="calc-card">
      <div class="icon">🎨</div>
      <div class="name">农田-艺人锻炼</div>
      <div class="desc">计算艺人锻炼最优点法</div>
    </a>

    <a href="calculator/bathhouse.html" class="calc-card">
      <div class="icon">🛁</div>
      <div class="name">澡堂</div>
      <div class="desc">计算澡堂最优点法</div>
    </a>
  </div>

  <p class="hint">更多计算器即将上线</p>
  <div id="adminLinks" style="display:none;text-align:center;margin-top:16px;">
    <a href="calculator/usage.html" style="font-size:13px;color:var(--text2);text-decoration:none;">📊 计算器使用记录</a>
  </div>
</div>

<script>
var curUser = null;
function getUser(){
  var s=localStorage.getItem('guild_current_user');
  if(!s){ window.location.href='login.html'; return null; }
  try{ var u=JSON.parse(s); if(!u.id)throw Error(); return u; }catch(_){ localStorage.removeItem('guild_current_user'); window.location.href='login.html'; return null; }
}
function init(){
  curUser = getUser();
  if(!curUser) return;
  // admin check removed for testing - all members have access
  document.getElementById('navUser').textContent = curUser.display_name || curUser.uid;
  if(curUser.is_admin) document.getElementById('adminLinks').style.display = 'block';
}
init();
</script>
</body>
</html>
