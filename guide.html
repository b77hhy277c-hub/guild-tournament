<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>点赞指南</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .topbar { display:flex; align-items:center; gap:16px; padding:14px 20px; border-bottom:1px solid var(--border-l); position:sticky; top:0; background:var(--bg); z-index:10; backdrop-filter:blur(20px); }
    .topbar a { color:var(--accent); text-decoration:none; font-size:14px; }
    .topbar h1 { font-size:18px; font-weight:600; }
    .main { max-width:720px; margin:0 auto; padding:40px 24px; text-align:center; }
    .main .icon { font-size:64px; margin-bottom:20px; }
    .main h2 { font-size:22px; font-weight:600; margin-bottom:8px; color:var(--text); }
    .main p { font-size:15px; color:var(--text2); }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="index.html">← 返回主界面</a>
    <h1>👍 点赞指南</h1>
  </div>
  <div class="main">
    <div class="icon">👍</div>
    <h2>功能开发中</h2>
    <p>该给谁点，一目了然 — 敬请期待</p>
  </div>
  <script>
    if(!localStorage.getItem('guild_current_user')) window.location.href='login.html';
  </script>
</body>
</html>
